name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '\.py$' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Run AI Code Review
        if: steps.changed.outputs.files != ''
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          FULL_REPORT="# 🤖 AI Code Review\n\n"
          for file in ${{ steps.changed.outputs.files }}; do
            if [ -f "$file" ]; then
              echo "Reviewing $file..."
              FULL_REPORT+="## \`$file\`\n\n"
              FULL_REPORT+="$(python review.py $file 2>/dev/null | tail -n +3)\n\n---\n\n"
            fi
          done
          printf "$FULL_REPORT" > full_review.md

      - name: Post review as PR comment
        if: steps.changed.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('full_review.md', 'utf8');
            if (body.trim().length > 0) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
